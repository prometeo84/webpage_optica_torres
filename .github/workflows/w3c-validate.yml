name: W3C Validate

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run site checks
        run: |
          python tools/site_checks.py

      - name: Fail on W3C errors
        run: |
          python - <<'PY'
import json, sys
report = json.load(open('tools/site_checks_report.json', encoding='utf-8'))
errors = 0
for page, data in report.get('pages', {}).items():
    w3c = data.get('w3c') or {}
    e = w3c.get('errors') or 0
    errors += e
if errors > 0:
    print(f'W3C errors found: {errors}')
    sys.exit(1)
print('No W3C errors found')
PY
