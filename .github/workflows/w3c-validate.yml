name: W3C Validate

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  validate:
    name: Validate HTML with validator.nu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validator (via container)
        run: |
          mkdir -p results
          echo "Validating index.html"
          docker run --rm -v ${{ github.workspace }}:/workspace ghcr.io/validator/validator:latest --format json /workspace/index.html > results/index.json || true
          echo "Validating especialistas/gioconda-torres/index.html"
          docker run --rm -v ${{ github.workspace }}:/workspace ghcr.io/validator/validator:latest --format json /workspace/especialistas/gioconda-torres/index.html > results/gioconda-index.json || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: w3c-results
          path: results

      - name: Show short summary
        run: |
          echo "Index errors:"; jq '.messages | map(select(.type=="error")) | length' results/index.json || true
          echo "Gioconda errors:"; jq '.messages | map(select(.type=="error")) | length' results/gioconda-index.json || true
name: W3C Validate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run site checks
        run: |
          python tools/site_checks.py

      - name: Fail on W3C errors
        run: |
          python tools/check_w3c_exit.py
