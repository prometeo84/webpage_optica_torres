<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Favicon Óptica Torres">
  <title>Óptica Torres</title>
  <!-- Top stroke (línea de arriba) - azul marino -->
  <path d="M2 32 C12 12, 52 12, 62 32" fill="none" stroke="#001f54" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom stroke (línea de abajo) - azul cardenillo -->
  <path d="M62 32 C52 52, 12 52, 2 32" fill="none" stroke="#2c2b6f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Iris y córnea en negro -->
  <circle cx="32" cy="32" r="10" fill="#000000" />
  <!-- Pupil (negro) -->
  <circle cx="32" cy="32" r="4" fill="#000000" />
</svg>
